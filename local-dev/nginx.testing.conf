# nginx configuration for split-routing with testing environment
# Local Next.js dev server (port 3000) for /aime/*
# Real testing.app.groupize.com for everything else
#
# PREREQUISITES:
# 1. Add to /etc/hosts: 127.0.0.1 testing.app.groupize.com
# 2. Generate mkcert certificates in ~/.local-dev-certs/
# 3. Replace YOUR_USERNAME with your actual macOS username
#
# SECURITY: Only use for non-production environments!
#
# Installation:
# 1. Copy and customize:
#    cp nginx.testing.example nginx.testing.conf
#    nano nginx.testing.conf
#    # Replace YOUR_USERNAME with your actual username (e.g., mdarwin)
#
# 2. macOS (Homebrew):
#    cp nginx.testing.conf /opt/homebrew/etc/nginx/servers/testing.app.groupize.com.conf
#    brew services restart nginx
#
# 3. Linux:
#    sudo cp nginx.testing.conf /etc/nginx/sites-available/testing.app.groupize.com
#    sudo ln -s /etc/nginx/sites-available/testing.app.groupize.com /etc/nginx/sites-enabled/
#    sudo systemctl restart nginx

upstream testing_next_upstream {
  server 127.0.0.1:3000;
  keepalive 64;
}

# Required for WebSocket support (HMR)
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 443 ssl http2;
  server_name testing.app.groupize.com;

  # Use mkcert certificates
  # IMPORTANT: Replace YOUR_USERNAME with your actual username (e.g., mdarwin)
  ssl_certificate /Users/YOUR_USERNAME/.local-dev-certs/testing.app.groupize.com.pem;
  ssl_certificate_key /Users/YOUR_USERNAME/.local-dev-certs/testing.app.groupize.com-key.pem;

  # Modern SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # ---- Route /aime/* to LOCAL Next.js dev server ----
  location /aime/ {
    proxy_pass http://testing_next_upstream;
    proxy_http_version 1.1;

    # Preserve headers and cookies
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    
    # CRITICAL: Forward cookies so Next.js can read JWT
    proxy_set_header Cookie $http_cookie;

    # Support WebSocket for HMR
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Avoid double compression issues
    proxy_set_header Accept-Encoding "";

    # Don't cache to preserve authentication
    add_header Cache-Control "no-cache, no-store, must-revalidate";

    # Long timeouts for AI operations (can take 5+ minutes)
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  # Handle /aime without trailing slash
  location = /aime {
    return 301 /aime/;
  }

  # ---- Next.js internal routes to local dev server ----
  location ~ ^/aime/(__|_next)/ {
    proxy_pass http://testing_next_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Cache fonts aggressively
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Fallback for Next.js routes without basePath
  location ~ ^/(__|_next)/ {
    proxy_pass http://testing_next_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Don't cache dev tools
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # ---- Everything else goes to REAL testing environment ----
  # NOTE: Use real IP to avoid infinite loop with /etc/hosts override
  # To find IP: nslookup testing.app.groupize.com (when /etc/hosts is commented out)
  # Current IP: 104.18.10.206 (update if testing environment IP changes)
  location / {
    proxy_pass https://104.18.10.206;
    proxy_http_version 1.1;

    # Preserve original host for AWS routing
    proxy_set_header Host testing.app.groupize.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    
    # Forward cookies for authentication
    proxy_set_header Cookie $http_cookie;

    # Don't verify SSL cert (it's the real testing server behind Cloudflare)
    proxy_ssl_verify off;
    proxy_ssl_server_name on;
    proxy_ssl_name testing.app.groupize.com;  # Explicitly set SNI hostname for TLS handshake

    proxy_set_header Accept-Encoding "";
  }

  # Helpful for debugging
  # access_log /opt/homebrew/var/log/nginx/testing-split.access.log;
  # error_log  /opt/homebrew/var/log/nginx/testing-split.error.log;
}

