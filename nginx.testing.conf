# nginx configuration for split-routing with testing environment
# Local Next.js dev server (port 3001) for /aime/*
# Real testing.app.groupize.com for everything else
#
# PREREQUISITES:
# 1. Add to /etc/hosts: 127.0.0.1 testing.app.groupize.com
# 2. Generate mkcert certificates:
#    mkdir -p ~/.local-dev-certs
#    cd ~/.local-dev-certs
#    mkcert testing.app.groupize.com
# 3. Replace YOUR_USERNAME with your actual macOS username
#
# INSTALLATION:
# macOS: cp nginx.testing.conf /opt/homebrew/etc/nginx/servers/testing.app.groupize.conf
#        brew services restart nginx
#
# SECURITY: Only use for non-production environments!

# Upstream for local Next.js dev server
upstream local_nextjs {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Upstream for real testing environment (direct IP to avoid /etc/hosts loop)
# To find IP: nslookup testing.app.groupize.com (when /etc/hosts is commented out)
upstream real_testing {
    server 104.18.10.206:443;
    keepalive 64;
}

# WebSocket support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name testing.app.groupize.com;

    # SSL configuration with mkcert certificates
    # IMPORTANT: Replace YOUR_USERNAME with your actual username (e.g., mdarwin)
    ssl_certificate /Users/YOUR_USERNAME/.local-dev-certs/testing.app.groupize.com.pem;
    ssl_certificate_key /Users/YOUR_USERNAME/.local-dev-certs/testing.app.groupize.com-key.pem;
    
    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # ---- Route /aime/* to LOCAL Next.js dev server ----
    location /aime/ {
        proxy_pass http://local_nextjs;
        proxy_http_version 1.1;

        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;

        # WebSocket support for HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long timeouts for AI operations
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Disable buffering for streaming responses
        proxy_buffering off;
        
        # No cache
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Handle /aime without trailing slash
    location = /aime {
        return 301 /aime/;
    }

    # ---- Next.js internal routes to LOCAL dev server ----
    location ~ ^/_next/ {
        proxy_pass http://local_nextjs;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support for HMR
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Long timeouts for WebSocket
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # No cache for dev tools
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~ ^/__/ {
        proxy_pass http://local_nextjs;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # No cache for dev tools
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---- Everything else goes to REAL testing environment ----
    location / {
        # Proxy to real testing server using direct IP
        proxy_pass https://real_testing;
        proxy_http_version 1.1;
        
        # CRITICAL: Set Host to testing.app.groupize.com for AWS routing
        proxy_set_header Host testing.app.groupize.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Cookie $http_cookie;
        
        # SSL verification settings for upstream
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name testing.app.groupize.com;
        
        # Standard timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logging
    access_log /opt/homebrew/var/log/nginx/testing-split.access.log;
    error_log /opt/homebrew/var/log/nginx/testing-split.error.log;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name testing.app.groupize.com;
    return 301 https://$server_name$request_uri;
}

