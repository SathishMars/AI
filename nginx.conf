# Nginx Configuration for Rails + Next.js Workflows Integration
#
# This configuration proxies:
# - /app/aimeworkflows/* -> Next.js Workflows app (port 3001)
# - Everything else -> Rails app (port 3000)
#
# Usage:
# 1. Copy to /usr/local/etc/nginx/servers/ (macOS) or /etc/nginx/sites-available/ (Linux)
# 2. Restart nginx: brew services restart nginx (macOS) or sudo systemctl restart nginx (Linux)

upstream rails_upstream {
  server 127.0.0.1:3000;
  keepalive 64;
}

upstream nextjs_workflows_upstream {
  server 127.0.0.1:3001;
  keepalive 64;
}

server {
  listen 80;
  server_name groupize.local;

  # Next.js static assets (_next/static, etc.)
  # These are generated as absolute paths by Next.js without basePath
  location /_next/ {
    proxy_pass http://nextjs_workflows_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Cache static assets aggressively
    proxy_cache_bypass $http_upgrade;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Next.js API routes
  # Routes /api/* to Next.js API handlers
  location /api/ {
    proxy_pass http://nextjs_workflows_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # CRITICAL: Forward cookies so Next.js can read JWT
    proxy_set_header Cookie $http_cookie;
    
    # Don't cache API responses
    proxy_cache_bypass $http_upgrade;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Next.js Workflows app root and all nested routes
  # Routes /app/aimeworkflows/* to Next.js at /* (path rewriting)
  location /app/aimeworkflows/ {
    # Rewrite /app/aimeworkflows/foo to /foo for Next.js
    rewrite ^/app/aimeworkflows/(.*)$ /$1 break;
    
    proxy_pass http://nextjs_workflows_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # CRITICAL: Forward cookies so Next.js can read JWT and session data
    proxy_set_header Cookie $http_cookie;
    
    # Don't cache authenticated pages
    proxy_cache_bypass $http_upgrade;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  
  # Handle /app/aimeworkflows without trailing slash
  location = /app/aimeworkflows {
    return 301 /app/aimeworkflows/;
  }
  
  # Future micro-apps can be added here:
  # location /app/approvals { proxy_pass http://nextjs_approvals_upstream; }
  # location /app/analytics { proxy_pass http://nextjs_analytics_upstream; }

  # Rails app - everything else (default)
  location / {
    proxy_pass http://rails_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    
    proxy_cache_bypass $http_upgrade;
  }
}

