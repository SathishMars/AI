# Example nginx configuration for proxying the Workflows micro-app
#
# This configuration sets up:
# - Workflows app at: http://groupize.local/aime/aimeworkflows/
# - Rails app at: http://groupize.local/* (everything else)
#
# Installation:
# 1. macOS (Homebrew):
#    cp nginx.example.conf /opt/homebrew/etc/nginx/servers/groupize.local.conf
#    brew services restart nginx
#
# 2. Linux:
#    sudo cp nginx.example.conf /etc/nginx/sites-available/groupize.local
#    sudo ln -s /etc/nginx/sites-available/groupize.local /etc/nginx/sites-enabled/
#    sudo systemctl restart nginx
#
# Prerequisites:
# - Rails app running on port 3000
# - Next.js Workflows app running on port 3001
# - /etc/hosts entry: 127.0.0.1 groupize.local

upstream rails_upstream {
  server 127.0.0.1:3000;
  keepalive 64;
}

upstream next_upstream {
  server 127.0.0.1:3001;
  keepalive 64;
}

# Required for $connection_upgrade var (WebSocket support)
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name groupize.local;

  # ---- Next.js Workflows Micro-App: /aime/aimeworkflows/* ----
  # With basePath: '/aime/aimeworkflows' in next.config.ts
  # Pass the full path including /aime/aimeworkflows to Next.js
  location /aime/aimeworkflows/ {
    proxy_pass http://next_upstream;
    proxy_http_version 1.1;

    # Preserve host and forwarding info
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Support Next dev HMR websockets
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Avoid double compression issues
    proxy_set_header Accept-Encoding "";
    
    # CRITICAL: Forward cookies so Next.js can read JWT
    proxy_set_header Cookie $http_cookie;
    
    # Don't cache to preserve authentication
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Handle /aime/aimeworkflows without trailing slash
  location = /aime/aimeworkflows {
    return 301 /aime/aimeworkflows/;
  }

  # ---- Next.js Internal Routes (fonts, HMR, etc.) with basePath ----
  # Prioritize routes with basePath first
  location ~ ^/aime/aimeworkflows/(__|_next)/ {
    proxy_pass http://next_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Cache fonts aggressively (but not for dev tools)
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ---- Next.js Internal Routes (fallback for routes without basePath) ----
  # Some Next.js dev tools may request without basePath in dev mode
  location ~ ^/(__|_next)/ {
    proxy_pass http://next_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Don't cache dev tools
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # ---- Future Micro-Apps ----
  # Approvals app would be:
  # location /aime/approvals/ {
  #   proxy_pass http://nextjs_approvals_upstream;  # port 3002
  #   # ... same headers as above
  # }
  
  # Analytics app would be:
  # location /aime/analytics/ {
  #   proxy_pass http://nextjs_analytics_upstream;  # port 3003
  #   # ... same headers as above
  # }

  # ---- Everything else → Rails ----
  location / {
    proxy_pass http://rails_upstream;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;

    proxy_set_header Accept-Encoding "";
  }

  # Helpful for debugging
  access_log /opt/homebrew/var/log/nginx/groupize.access.log;
  error_log  /opt/homebrew/var/log/nginx/groupize.error.log;
}
